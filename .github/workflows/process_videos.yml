name: Process Drive Videos

on:
  schedule:
    - cron: '30 8 * * *'  # 2:00 PM IST = 08:30 UTC
  workflow_dispatch:        # allows manual run from GitHub UI

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib tqdm

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Write credentials files
        run: |
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GDRIVE_TOKEN }}' > token.json

      - name: Run script
        run: python script.py

      - name: Save progress
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add progress.json

          git commit -m "Update progress" || echo "No changes"

          git push