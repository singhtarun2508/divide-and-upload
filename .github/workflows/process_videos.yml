name: Process Drive Videos

on:
  schedule:
    - cron: '30 8 * * *'   # 2:00 PM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update apt cache
        run: sudo apt-get update

      - name: Check FFmpeg
        run: |
          ffmpeg -version || true

      - name: Install FFmpeg if missing
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --fix-missing ffmpeg
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            tqdm

      - name: Write credentials files
        run: |
          cat <<'EOF' > credentials.json
          ${{ secrets.GDRIVE_CREDENTIALS }}
          EOF

          cat <<'EOF' > token.json
          ${{ secrets.GDRIVE_TOKEN }}
          EOF

      - name: Run script
        run: python script.py
